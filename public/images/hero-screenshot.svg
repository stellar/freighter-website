<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" fill="none">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent-soft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(99,102,241,0.15)"/>
      <stop offset="100%" stop-color="rgba(139,92,246,0.08)"/>
    </linearGradient>
    <clipPath id="phone-clip">
      <rect x="100" y="60" width="320" height="580" rx="36"/>
    </clipPath>
    <clipPath id="ext-clip">
      <rect x="540" y="100" width="560" height="500" rx="16"/>
    </clipPath>
  </defs>

  <!-- ===================== -->
  <!-- MOBILE PHONE (LEFT)   -->
  <!-- ===================== -->

  <!-- Phone outer shell -->
  <rect x="96" y="56" width="328" height="588" rx="40" fill="#1a1a1a" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Phone screen -->
  <g clip-path="url(#phone-clip)">
    <rect x="100" y="60" width="320" height="580" fill="#0c0c0c"/>

    <!-- Status bar -->
    <text x="120" y="86" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="rgba(237,237,237,0.6)">9:41</text>
    <rect x="352" y="76" width="48" height="12" rx="3" fill="rgba(237,237,237,0.3)"/>
    <!-- Battery icon -->
    <rect x="354" y="78" width="30" height="8" rx="2" fill="rgba(99,102,241,0.7)"/>

    <!-- Dynamic island -->
    <rect x="210" y="66" width="100" height="24" rx="12" fill="#000"/>

    <!-- Wallet header -->
    <circle cx="130" cy="120" r="16" fill="url(#accent)"/>
    <path d="M124 117h12v2.5h-9v2.5h7.5v2.5h-7.5v5.5h-3V117z" fill="white" transform="scale(0.7) translate(47, 38)"/>
    <text x="154" y="117" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ededed">Freighter</text>
    <text x="154" y="131" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(237,237,237,0.4)">Main Account</text>
    <!-- Settings icon -->
    <circle cx="390" cy="120" r="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)"/>

    <!-- Balance area -->
    <text x="260" y="185" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(237,237,237,0.4)">Total Balance</text>
    <text x="260" y="222" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700" fill="#ededed">$1,557.60</text>
    <text x="260" y="248" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="rgba(99,102,241,0.8)">12,450.83 XLM</text>

    <!-- Action buttons row -->
    <rect x="120" y="272" width="72" height="56" rx="14" fill="rgba(99,102,241,0.12)"/>
    <text x="156" y="308" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b9cf7">Send</text>
    <!-- Send icon -->
    <line x1="156" y1="285" x2="156" y2="295" stroke="#8b9cf7" stroke-width="1.5" stroke-linecap="round"/>
    <polyline points="152,289 156,285 160,289" fill="none" stroke="#8b9cf7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="204" y="272" width="72" height="56" rx="14" fill="rgba(99,102,241,0.12)"/>
    <text x="240" y="308" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b9cf7">Receive</text>
    <!-- Receive icon -->
    <line x1="240" y1="285" x2="240" y2="295" stroke="#8b9cf7" stroke-width="1.5" stroke-linecap="round"/>
    <polyline points="236,291 240,295 244,291" fill="none" stroke="#8b9cf7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="288" y="272" width="72" height="56" rx="14" fill="rgba(99,102,241,0.12)"/>
    <text x="324" y="308" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b9cf7">Swap</text>
    <!-- Swap icon -->
    <polyline points="318,286 324,290 330,286" fill="none" stroke="#8b9cf7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="318,294 324,290 330,294" fill="none" stroke="#8b9cf7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Assets header -->
    <text x="120" y="362" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ededed">Assets</text>

    <!-- Asset 1 - XLM -->
    <rect x="112" y="376" width="296" height="60" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)"/>
    <circle cx="142" cy="406" r="16" fill="url(#accent)"/>
    <text x="142" y="410" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="white">XLM</text>
    <text x="168" y="401" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ededed">Stellar Lumens</text>
    <text x="168" y="416" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(237,237,237,0.35)">10,000 XLM</text>
    <text x="396" y="401" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ededed">$1,250.00</text>
    <text x="396" y="416" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#34d399">+2.4%</text>

    <!-- Asset 2 - USDC -->
    <rect x="112" y="444" width="296" height="60" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)"/>
    <circle cx="142" cy="474" r="16" fill="#2775ca"/>
    <text x="142" y="478" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="white">USDC</text>
    <text x="168" y="469" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ededed">USD Coin</text>
    <text x="168" y="484" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(237,237,237,0.35)">307.60 USDC</text>
    <text x="396" y="469" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ededed">$307.60</text>
    <text x="396" y="484" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(237,237,237,0.35)">0.0%</text>

    <!-- Asset 3 - yXLM -->
    <rect x="112" y="512" width="296" height="60" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)"/>
    <circle cx="142" cy="542" r="16" fill="#f59e0b"/>
    <text x="142" y="546" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="white">yXLM</text>
    <text x="168" y="537" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ededed">Ultra Stellar</text>
    <text x="168" y="552" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(237,237,237,0.35)">2,450.83 yXLM</text>
    <text x="396" y="537" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ededed">$306.35</text>
    <text x="396" y="552" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#34d399">+1.1%</text>

    <!-- Bottom nav -->
    <rect x="100" y="590" width="320" height="50" fill="#111111"/>
    <line x1="100" y1="590" x2="420" y2="590" stroke="rgba(255,255,255,0.06)"/>
    <text x="160" y="614" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#8b9cf7">Wallet</text>
    <text x="260" y="614" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="rgba(237,237,237,0.3)">Activity</text>
    <text x="360" y="614" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="rgba(237,237,237,0.3)">Settings</text>

    <!-- Home indicator -->
    <rect x="220" y="628" width="80" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Phone notch reflection -->
  <rect x="100" y="60" width="320" height="2" rx="1" fill="rgba(255,255,255,0.04)"/>

  <!-- "Mobile" label -->
  <text x="260" y="680" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="rgba(237,237,237,0.3)" letter-spacing="0.08em">MOBILE</text>


  <!-- ============================== -->
  <!-- BROWSER EXTENSION (RIGHT)       -->
  <!-- ============================== -->

  <!-- Browser window frame -->
  <rect x="536" y="96" width="568" height="508" rx="20" fill="#141414" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>

  <!-- Browser chrome bar -->
  <rect x="536" y="96" width="568" height="44" rx="20" fill="#1a1a1a"/>
  <rect x="536" y="120" width="568" height="20" fill="#1a1a1a"/>

  <!-- Traffic lights -->
  <circle cx="560" cy="118" r="5" fill="#ff5f57"/>
  <circle cx="576" cy="118" r="5" fill="#febc2e"/>
  <circle cx="592" cy="118" r="5" fill="#28c840"/>

  <!-- URL bar -->
  <rect x="680" y="108" width="340" height="22" rx="6" fill="rgba(255,255,255,0.06)"/>
  <text x="695" y="123" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(237,237,237,0.35)">stellar.org</text>

  <!-- Extension icon in toolbar -->
  <rect x="1050" y="108" width="22" height="22" rx="5" fill="url(#accent)"/>
  <path d="M1056 115h10v2h-7v2h6v2h-6v4h-3V115z" fill="white" transform="scale(0.55) translate(940, 50)"/>

  <!-- Browser content area (blurred website) -->
  <g clip-path="url(#ext-clip)">
    <rect x="540" y="140" width="560" height="460" fill="#0c0c0c"/>

    <!-- Fake website content behind popup -->
    <rect x="560" y="160" width="200" height="14" rx="4" fill="rgba(255,255,255,0.06)"/>
    <rect x="560" y="182" width="320" height="10" rx="3" fill="rgba(255,255,255,0.03)"/>
    <rect x="560" y="200" width="280" height="10" rx="3" fill="rgba(255,255,255,0.03)"/>
    <rect x="560" y="232" width="520" height="180" rx="12" fill="rgba(255,255,255,0.02)"/>
    <rect x="560" y="430" width="160" height="12" rx="4" fill="rgba(255,255,255,0.04)"/>
    <rect x="560" y="452" width="400" height="10" rx="3" fill="rgba(255,255,255,0.02)"/>
    <rect x="560" y="470" width="350" height="10" rx="3" fill="rgba(255,255,255,0.02)"/>

    <!-- Extension popup (overlaid) -->
    <g>
      <!-- Popup shadow -->
      <rect x="730" y="150" width="350" height="430" rx="16" fill="rgba(0,0,0,0.4)" filter="url(#shadow)"/>

      <!-- Popup body -->
      <rect x="726" y="146" width="350" height="430" rx="16" fill="#141414" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

      <!-- Popup header -->
      <rect x="727" y="147" width="348" height="48" rx="16" fill="#1a1a1a"/>
      <rect x="727" y="179" width="348" height="16" fill="#1a1a1a"/>

      <!-- Extension logo -->
      <rect x="744" y="158" width="24" height="24" rx="6" fill="url(#accent)"/>
      <text x="756" y="175" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800" fill="white">F</text>
      <text x="778" y="175" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ededed">Freighter</text>

      <!-- Account selector -->
      <rect x="920" y="158" width="140" height="24" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)"/>
      <text x="932" y="174" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(237,237,237,0.5)">Account 1</text>
      <text x="1044" y="174" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(237,237,237,0.3)">GDKL...X4R2</text>

      <!-- Network badge -->
      <rect x="744" y="204" width="70" height="20" rx="10" fill="rgba(52,211,153,0.1)"/>
      <circle cx="757" cy="214" r="3" fill="#34d399"/>
      <text x="766" y="218" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#34d399">Mainnet</text>

      <!-- Balance -->
      <text x="901" y="260" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(237,237,237,0.4)">Total Balance</text>
      <text x="901" y="290" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700" fill="#ededed">$1,557.60</text>
      <text x="901" y="312" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(99,102,241,0.7)">12,450.83 XLM</text>

      <!-- Action buttons -->
      <rect x="746" y="330" width="100" height="38" rx="10" fill="url(#accent)"/>
      <text x="796" y="354" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Send</text>

      <rect x="855" y="330" width="100" height="38" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)"/>
      <text x="905" y="354" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ededed">Receive</text>

      <rect x="964" y="330" width="92" height="38" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)"/>
      <text x="1010" y="354" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ededed">Swap</text>

      <!-- Divider -->
      <line x1="746" y1="384" x2="1056" y2="384" stroke="rgba(255,255,255,0.06)"/>

      <!-- Assets in popup -->
      <text x="746" y="408" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ededed">Assets</text>

      <!-- Asset 1 -->
      <rect x="746" y="420" width="290" height="48" rx="10" fill="rgba(255,255,255,0.03)"/>
      <circle cx="770" cy="444" r="13" fill="url(#accent)"/>
      <text x="770" y="448" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="white">XLM</text>
      <text x="792" y="440" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ededed">Stellar Lumens</text>
      <text x="792" y="454" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(237,237,237,0.3)">10,000 XLM</text>
      <text x="1024" y="440" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ededed">$1,250.00</text>
      <text x="1024" y="454" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#34d399">+2.4%</text>

      <!-- Asset 2 -->
      <rect x="746" y="474" width="290" height="48" rx="10" fill="rgba(255,255,255,0.03)"/>
      <circle cx="770" cy="498" r="13" fill="#2775ca"/>
      <text x="770" y="502" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="white">USDC</text>
      <text x="792" y="494" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ededed">USD Coin</text>
      <text x="792" y="508" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(237,237,237,0.3)">307.60 USDC</text>
      <text x="1024" y="494" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ededed">$307.60</text>
      <text x="1024" y="508" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(237,237,237,0.35)">0.0%</text>

      <!-- Asset 3 -->
      <rect x="746" y="528" width="290" height="48" rx="10" fill="rgba(255,255,255,0.03)"/>
      <circle cx="770" cy="552" r="13" fill="#f59e0b"/>
      <text x="770" y="556" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="700" fill="white">yXLM</text>
      <text x="792" y="548" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ededed">Ultra Stellar</text>
      <text x="792" y="562" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(237,237,237,0.3)">2,450.83 yXLM</text>
      <text x="1024" y="548" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ededed">$306.35</text>
      <text x="1024" y="562" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#34d399">+1.1%</text>
    </g>
  </g>

  <!-- "Extension" label -->
  <text x="820" y="640" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="rgba(237,237,237,0.3)" letter-spacing="0.08em">EXTENSION</text>

  <!-- Subtle connection line between devices -->
  <line x1="430" y1="350" x2="530" y2="350" stroke="url(#accent)" stroke-width="1" stroke-dasharray="4 4" opacity="0.3"/>
  <circle cx="480" cy="350" r="4" fill="url(#accent)" opacity="0.4"/>
</svg>
